<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 村庄规划互动平台</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.admin-page {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #1f3552;
      background:
        linear-gradient(135deg, rgba(235, 247, 232, 0.88), rgba(237, 246, 255, 0.92)),
        url("./assets/orthophoto.png") center / cover fixed;
    }

    html, body.admin-page {
      overflow-y: auto;
    }

    .admin-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.72);
      pointer-events: none;
    }

    .admin-shell {
      position: relative;
      z-index: 1;
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }

    .admin-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #1f3552;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0;
    }

    .admin-brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      color: #ffffff;
      background: linear-gradient(135deg, #2f7a2a, #1f7a8c);
      box-shadow: 0 8px 20px rgba(47, 105, 40, 0.18);
    }

    .admin-btn,
    .admin-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid rgba(31, 53, 82, 0.12);
      background: #ffffff;
      color: #1f3552;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    .admin-btn:hover,
    .admin-link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(31, 53, 82, 0.12);
    }

    .admin-btn-primary {
      border-color: transparent;
      background: linear-gradient(135deg, #2f7a2a, #2f6928);
      color: #ffffff;
    }

    .admin-btn-danger {
      border-color: rgba(201, 74, 74, 0.22);
      background: #fff5f5;
      color: #b73e3e;
    }

    .admin-btn-danger:hover {
      background: #ffe8e8;
      box-shadow: 0 8px 22px rgba(201, 74, 74, 0.16);
    }

    .admin-delete-btn {
      min-height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    .admin-action-muted {
      color: #a8b3c1;
      font-size: 13px;
      font-weight: 600;
    }

    .admin-inline-notice {
      margin: 0 0 14px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(31, 53, 82, 0.1);
      background: rgba(255, 255, 255, 0.9);
      color: #1f3552;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(31, 53, 82, 0.08);
    }

    .admin-inline-notice.success {
      border-color: rgba(47, 105, 40, 0.22);
      background: #f0faf0;
      color: #2f6928;
    }

    .admin-inline-notice.error {
      border-color: rgba(201, 74, 74, 0.22);
      background: #fff5f5;
      color: #b73e3e;
    }

    .admin-inline-notice.warning {
      border-color: rgba(245, 158, 11, 0.3);
      background: #fffbeb;
      color: #92400e;
    }

    .admin-delete-btn:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
      box-shadow: none;
    }

    .admin-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 53, 82, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(31, 53, 82, 0.12);
      overflow: hidden;
    }

    .admin-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 28px;
      border-bottom: 1px solid rgba(31, 53, 82, 0.06);
      flex-wrap: wrap;
    }

    .admin-card-header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: #1f3552;
    }

    .admin-count {
      color: #5f7385;
      font-size: 13px;
      font-weight: 600;
    }

    .admin-table-wrap {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .admin-table thead th {
      padding: 14px 20px;
      text-align: left;
      font-weight: 700;
      font-size: 12px;
      color: #728296;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(31, 53, 82, 0.03);
      border-bottom: 1px solid rgba(31, 53, 82, 0.08);
      white-space: nowrap;
    }

    .admin-table tbody td {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(31, 53, 82, 0.06);
      color: #1f3552;
      font-weight: 600;
      vertical-align: middle;
    }

    .admin-table tbody tr:last-child td {
      border-bottom: none;
    }

    .admin-table tbody tr:hover {
      background: rgba(25, 118, 210, 0.03);
    }

    .admin-table .cell-muted {
      color: #9aa9b8;
      font-weight: 500;
    }

    .admin-contribution-badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(47, 105, 40, 0.08);
      border: 1px solid rgba(47, 105, 40, 0.18);
      color: #2f4f66;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .admin-empty {
      padding: 48px 28px;
      text-align: center;
      color: #5f7385;
    }

    .admin-locked {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 53, 82, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(31, 53, 82, 0.12);
      padding: 64px 32px;
      text-align: center;
    }

    .admin-locked h1 {
      margin: 0 0 12px;
      color: #1f3552;
      font-size: 26px;
    }

    .admin-locked p {
      margin: 0 0 28px;
      color: #5f7385;
      font-size: 15px;
    }

    .admin-photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      padding: 20px 28px;
    }

    .admin-photo-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(31, 53, 82, 0.04);
      border: 1px solid rgba(31, 53, 82, 0.08);
      transition: transform 0.16s ease, box-shadow 0.18s ease;
    }

    .admin-photo-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(31, 53, 82, 0.12);
    }

    .admin-photo-item img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .admin-photo-meta {
      padding: 10px 12px;
      font-size: 12px;
      color: #5f7385;
    }

    .admin-photo-meta .photo-type {
      font-weight: 700;
      color: #1f3552;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-photo-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #b73e3e;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.18s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .admin-photo-item:hover .admin-photo-delete {
      opacity: 1;
    }

    .admin-photo-delete:hover {
      background: #ffe8e8;
    }

    .admin-photo-download {
      position: absolute;
      top: 8px;
      right: 44px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #1f7a8c;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.18s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      text-decoration: none;
    }

    .admin-photo-item:hover .admin-photo-download {
      opacity: 1;
    }

    .admin-photo-download:hover {
      background: #e6f7ff;
    }

    .admin-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .admin-sidebar {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: 24px;
    }

    .admin-menu {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 53, 82, 0.08);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(31, 53, 82, 0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .admin-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border: none;
      background: transparent;
      color: #5f7385;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.18s ease, color 0.18s ease;
      text-align: left;
      border-left: 3px solid transparent;
    }

    .admin-menu-item:hover {
      background: rgba(25, 118, 210, 0.06);
      color: #1f3552;
    }

    .admin-menu-item.active {
      background: rgba(25, 118, 210, 0.1);
      color: #1f3552;
      border-left-color: #2f7a2a;
    }

    .admin-main {
      flex: 1;
      min-width: 0;
    }

    .admin-tab-panel {
      display: none;
    }

    .admin-tab-panel.active {
      display: block;
    }

    @media (max-width: 720px) {
      .admin-layout {
        flex-direction: column;
      }
      .admin-sidebar {
        width: 100%;
        position: static;
      }
      .admin-menu {
        flex-direction: row;
        border-radius: 12px;
      }
      .admin-menu-item {
        flex: 1;
        justify-content: center;
        border-left: none;
        border-bottom: 3px solid transparent;
      }
      .admin-menu-item.active {
        border-left-color: transparent;
        border-bottom-color: #2f7a2a;
      }
      .admin-shell {
        width: calc(100% - 24px);
        padding: 20px 0 40px;
      }

      .admin-topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .admin-card-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .admin-table thead th,
      .admin-table tbody td {
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body class="admin-page">
  <main class="admin-shell">
    <header class="admin-topbar">
      <a class="admin-brand" href="./profile.html" aria-label="返回个人中心">
        <span class="admin-brand-mark">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </span>
        <span>村庄规划互动平台 · 后台管理</span>
      </a>
      <a class="admin-link-btn" href="./profile.html">返回个人中心</a>
    </header>

    <section id="adminLocked" class="admin-locked" style="display:none;">
      <h1>权限不足</h1>
      <p>只有管理员账号才能访问后台管理平台。</p>
      <a class="admin-btn admin-btn-primary" href="./profile.html">返回个人中心</a>
    </section>

    <section id="adminContent" style="display:none;">
      <div class="admin-layout">
        <aside class="admin-sidebar">
          <nav class="admin-menu">
            <button class="admin-menu-item active" type="button" data-admin-tab="users">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              <span>账号管理</span>
            </button>
            <button class="admin-menu-item" type="button" data-admin-tab="photos">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              <span>照片管理</span>
            </button>
            <button class="admin-menu-item" type="button" data-admin-tab="messages">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
              <span>留言管理</span>
            </button>
          </nav>
        </aside>
        <div class="admin-main">
          <div id="adminTabUsers" class="admin-tab-panel active">
            <div class="admin-card">
              <div class="admin-card-header">
                <h1>注册账号列表</h1>
                <span id="adminUserCount" class="admin-count">共 0 个账号</span>
              </div>
              <div class="admin-table-wrap">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>用户名</th>
                      <th>学号</th>
                      <th>性别</th>
                      <th>班级</th>
                      <th>年级</th>
                      <th>注册时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="adminTableBody">
                    <tr>
                      <td colspan="8" class="admin-empty">加载中...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          <div id="adminTabPhotos" class="admin-tab-panel">
            <div class="admin-card">
              <div class="admin-card-header">
                <h1>照片管理</h1>
                <span id="adminPhotoCount" class="admin-count">共 0 张照片</span>
              </div>
              <div id="adminPhotoGrid" class="admin-photo-grid">
                <div class="admin-empty" style="grid-column: 1 / -1;">加载中...</div>
              </div>
            </div>
          </div>
          <div id="adminTabMessages" class="admin-tab-panel">
            <div class="admin-card">
              <div class="admin-card-header">
                <h1>留言管理</h1>
                <div style="display:flex;align-items:center;gap:10px;">
                  <select id="adminMessageSortSelect" class="community-message-sort-select" style="height:32px;">
                    <option value="time_desc">时间晚→早</option>
                    <option value="time_asc">时间早→晚</option>
                    <option value="likes_desc">点赞多→少</option>
                    <option value="likes_asc">点赞少→多</option>
                    <option value="replies_desc">评论多→少</option>
                    <option value="replies_asc">评论少→多</option>
                  </select>
                  <span id="adminMessageCount" class="admin-count">共 0 条留言</span>
                </div>
              </div>
              <div class="admin-table-wrap">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>类型</th>
                      <th>详情</th>
                      <th>上报人</th>
                      <th>点赞</th>
                      <th>评论</th>
                      <th>时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="adminMessageTableBody">
                    <tr>
                      <td colspan="8" class="admin-empty">加载中...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="adminMessageDetailModal" class="custom-modal-overlay is-hidden">
    <div class="custom-modal" style="max-width:600px;">
      <div class="custom-modal-header">
        <h3 class="custom-modal-title" id="adminMessageDetailTitle">留言详情</h3>
      </div>
      <div class="custom-modal-body" id="adminMessageDetailBody" style="max-height:70vh;overflow-y:auto;">
        <!-- 动态填充 -->
      </div>
      <div class="custom-modal-footer">
        <button id="adminMessageDetailClose" class="custom-modal-btn custom-modal-btn-cancel" type="button">关闭</button>
      </div>
    </div>
  </div>

  <div id="adminConfirmModal" class="custom-modal-overlay is-hidden">
    <div class="custom-modal">
      <div class="custom-modal-header">
        <h3 class="custom-modal-title" id="adminConfirmTitle">确认</h3>
      </div>
      <div class="custom-modal-body">
        <p class="custom-modal-message" id="adminConfirmMessage"></p>
      </div>
      <div class="custom-modal-footer">
        <button id="adminConfirmCancel" class="custom-modal-btn custom-modal-btn-cancel" type="button">取消</button>
        <button id="adminConfirmOk" class="custom-modal-btn custom-modal-btn-ok danger" type="button">确认删除</button>
      </div>
    </div>
  </div>

  <script defer src="auth-system.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="admin.js"></script>
</body>
</html>
