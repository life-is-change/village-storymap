<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人中心 - 村庄规划互动平台</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.profile-page {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #1f3552;
      background:
        linear-gradient(135deg, rgba(235, 247, 232, 0.88), rgba(237, 246, 255, 0.92)),
        url("./assets/orthophoto.png") center / cover fixed;
    }

    .profile-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.72);
      pointer-events: none;
    }

    .profile-shell {
      position: relative;
      z-index: 1;
      width: min(720px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .profile-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
    }

    .profile-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #1f3552;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0;
    }

    .profile-brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      color: #ffffff;
      background: linear-gradient(135deg, #2f7a2a, #1f7a8c);
      box-shadow: 0 8px 20px rgba(47, 105, 40, 0.18);
    }

    .profile-btn,
    .profile-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid rgba(31, 53, 82, 0.12);
      background: #ffffff;
      color: #1f3552;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    .profile-btn:hover,
    .profile-link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(31, 53, 82, 0.12);
    }

    .profile-btn-primary {
      border-color: transparent;
      background: linear-gradient(135deg, #2f7a2a, #2f6928);
      color: #ffffff;
    }

    .profile-btn-danger {
      border-color: rgba(201, 74, 74, 0.18);
      color: #a43e3e;
      background: #fff;
    }

    /* Locked state */
    .profile-locked {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 53, 82, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(31, 53, 82, 0.12);
      padding: 64px 32px;
      text-align: center;
    }

    .profile-locked h1 {
      margin: 0 0 12px;
      color: #1f3552;
      font-size: 26px;
    }

    .profile-locked p {
      margin: 0 0 28px;
      color: #5f7385;
      font-size: 15px;
    }

    /* Profile Hero */
    .profile-hero {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 53, 82, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(31, 53, 82, 0.12);
      padding: 40px 32px 32px;
      text-align: center;
      margin-bottom: 18px;
    }

    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #2f7a2a, #1f7a8c);
      box-shadow: 0 10px 28px rgba(47, 105, 40, 0.22);
      margin-bottom: 16px;
    }

    .profile-hero h1 {
      margin: 0 0 6px;
      font-size: 28px;
      color: #1f3552;
      letter-spacing: 0;
    }

    .profile-hero p {
      margin: 0;
      color: #5f7385;
      font-size: 15px;
    }

    /* Info card */
    .profile-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(31, 53, 82, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(31, 53, 82, 0.12);
      overflow: hidden;
    }

    .profile-card-header {
      padding: 22px 28px 0;
      font-size: 17px;
      font-weight: 800;
      color: #1f3552;
    }

    .profile-info-list {
      padding: 12px 0;
    }

    .profile-info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 28px;
      min-height: 44px;
      transition: background 0.15s ease;
    }

    .profile-info-row:hover {
      background: rgba(25, 118, 210, 0.03);
    }

    .profile-info-row + .profile-info-row {
      border-top: 1px solid rgba(31, 53, 82, 0.06);
    }

    .profile-info-row-label {
      color: #5f7385;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .profile-info-row-value {
      flex: 1;
      color: #1f3552;
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .profile-info-row-input-wrap {
      display: none;
      flex: 1;
      text-align: right;
    }

    .profile-info-row-input-wrap.is-active {
      display: block;
    }

    .profile-info-row-input-wrap.is-active + .profile-info-row-value {
      display: none;
    }

    .profile-info-row-input-wrap select,
    .profile-info-row-input-wrap input {
      width: 100%;
      max-width: 200px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #1976d2;
      border-radius: 4px;
      background: #ffffff;
      font-size: 13px;
      color: #1f3552;
      outline: none;
      font-family: inherit;
      text-align: right;
      transition: box-shadow 0.2s ease;
    }

    .profile-info-row-input-wrap select:focus,
    .profile-info-row-input-wrap input:focus {
      box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.15);
    }

    /* 与右侧要素信息面板一致的编辑按钮 */
    .profile-edit-field-btn {
      width: 24px;
      height: 24px;
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      color: #1976d2;
      cursor: pointer;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }

    .profile-info-row:hover .profile-edit-field-btn {
      opacity: 1;
    }

    .profile-edit-field-btn:hover {
      opacity: 1;
      background: rgba(25, 118, 210, 0.1);
    }

    .profile-edit-field-btn svg {
      width: 14px;
      height: 14px;
    }

    .profile-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 1000;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .profile-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .profile-toast.success {
      background: #e9f6e6;
      color: #2f6928;
      border: 1px solid rgba(47, 105, 40, 0.18);
    }

    .profile-toast.error {
      background: #fceaea;
      color: #a43e3e;
      border: 1px solid rgba(201, 74, 74, 0.18);
    }

    /* 确认弹窗 */
    .profile-dialog-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    .profile-dialog {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(31, 53, 82, 0.1);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(31, 53, 82, 0.18);
      width: min(400px, calc(100% - 32px));
      max-width: 400px;
      overflow: hidden;
      animation: profileDialogIn 0.22s ease;
    }

    @keyframes profileDialogIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .profile-dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }

    .profile-dialog-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: #1f3552;
    }

    .profile-dialog-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #5f7385;
      font-size: 22px;
      cursor: pointer;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    .profile-dialog-close:hover {
      background: rgba(31, 53, 82, 0.08);
    }

    .profile-dialog-body {
      padding: 16px 24px;
      color: #5f7385;
      font-size: 14px;
      line-height: 1.7;
    }

    .profile-dialog-body p {
      margin: 0 0 8px;
    }

    .profile-dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 24px 20px;
    }

    @media (max-width: 720px) {
      .profile-shell {
        width: calc(100% - 24px);
        padding: 20px 0 40px;
      }

      .profile-topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .profile-hero h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body class="profile-page">
  <main class="profile-shell">
    <header class="profile-topbar">
      <div class="profile-brand">
        <span class="profile-brand-mark">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </span>
        <span>村庄规划互动平台</span>
      </div>
      <div>
        <a id="adminEntryBtn" class="profile-link-btn" href="./admin.html" style="display:none;">进入后台管理</a>
        <a class="profile-link-btn" href="./index.html">返回首页</a>
      </div>
    </header>

    <section id="profileLocked" class="profile-locked" style="display:none;">
      <h1>请先登录</h1>
      <p>登录后即可查看和管理个人资料。</p>
      <button id="profileLoginBtn" class="profile-btn profile-btn-primary" type="button">登录/注册</button>
    </section>

    <section id="profileContent" style="display:none;">
      <div class="profile-hero">
        <div id="profileInitial" class="profile-avatar">用</div>
        <h1 id="profileName">--</h1>
        <p id="profileStudentId">学号：--</p>
      </div>

      <div class="profile-card">
        <div class="profile-card-header">基本资料</div>
        <div class="profile-info-list" aria-label="个人信息">
          <div class="profile-info-row">
            <span class="profile-info-row-label">用户名</span>
            <span id="profileFieldName" class="profile-info-row-value">--</span>
          </div>
          <div class="profile-info-row">
            <span class="profile-info-row-label">学号</span>
            <span id="profileFieldStudentId" class="profile-info-row-value">--</span>
          </div>
          <div class="profile-info-row" data-field="gender">
            <span class="profile-info-row-label">性别</span>
            <div class="profile-info-row-input-wrap" id="profileGenderWrap">
              <select id="profileGenderInput">
                <option value="">未填写</option>
                <option value="男">男</option>
                <option value="女">女</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <span id="profileFieldGender" class="profile-info-row-value">未填写</span>
            <button class="profile-edit-field-btn" data-edit="gender" type="button" title="编辑">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
          </div>
          <div class="profile-info-row" data-field="className">
            <span class="profile-info-row-label">班级</span>
            <div class="profile-info-row-input-wrap" id="profileClassNameWrap">
              <input id="profileClassNameInput" type="text" maxlength="30" placeholder="例如：城乡规划1班" />
            </div>
            <span id="profileFieldClassName" class="profile-info-row-value">未填写</span>
            <button class="profile-edit-field-btn" data-edit="className" type="button" title="编辑">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
          </div>
          <div class="profile-info-row" data-field="grade">
            <span class="profile-info-row-label">年级</span>
            <div class="profile-info-row-input-wrap" id="profileGradeWrap">
              <input id="profileGradeInput" type="text" maxlength="20" placeholder="例如：2024级" />
            </div>
            <span id="profileFieldGrade" class="profile-info-row-value">未填写</span>
            <button class="profile-edit-field-btn" data-edit="grade" type="button" title="编辑">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
          </div>
          <div class="profile-info-row">
            <span class="profile-info-row-label">贡献值</span>
            <span id="profileFieldContribution" class="profile-info-row-value">0 | Lv.1</span>
          </div>
          <div class="profile-info-row" id="deleteAccountRow">
            <span class="profile-info-row-label">账号操作</span>
            <button id="deleteAccountBtn" class="profile-btn profile-btn-danger" type="button">注销账号</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="profileToast" class="profile-toast"></div>

  <!-- 注销账号确认弹窗 -->
  <div id="deleteAccountDialog" class="profile-dialog-overlay" style="display:none;">
    <div class="profile-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteDialogTitle">
      <div class="profile-dialog-header">
        <h3 id="deleteDialogTitle" class="profile-dialog-title">确认注销账号</h3>
        <button type="button" class="profile-dialog-close" id="deleteDialogCloseBtn" title="关闭">&times;</button>
      </div>
      <div class="profile-dialog-body">
        <p>注销后，您的个人资料、贡献值等数据将被清空且无法恢复。</p>
        <p style="color:#a43e3e; font-weight:700; margin-bottom:0;">是否确认注销？</p>
      </div>
      <div class="profile-dialog-footer">
        <button type="button" class="profile-btn" id="deleteDialogCancelBtn">取消</button>
        <button type="button" class="profile-btn profile-btn-danger" id="deleteDialogConfirmBtn">确认注销</button>
      </div>
    </div>
  </div>

  <script defer src="auth-system.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="profile-center.js"></script>
</body>
</html>
